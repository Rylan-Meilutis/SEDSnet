# GitLab CI Pipeline Configuration
workflow:
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$CI_PIPELINE_SOURCE == "schedule"'

stages:
  - test
  - release
  - wheels
  - publish

rust-tests:
  stage: test
  image:
    name: registry.gitlab.rylanswebsite.com/rylan-meilutis/rust-docker-builder:x86
  script:
    - chmod +x build.py && ./build.py test

cargo-release:
  stage: release
  image: rust:latest
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v/'
  before_script:
    - apt-get update
    - apt-get install -y python3
  script:
    - python3 publish_crates.py --skip-tests --publish

linux-wheels:
  stage: wheels
  image:
    name: ghcr.io/pyo3/maturin:latest
    entrypoint: [""]
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v/'
  parallel:
    matrix:
      - TARGET:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
          - armv7-unknown-linux-gnueabihf
          - i686-unknown-linux-gnu
  script:
    - maturin build --release --compatibility pypi --out dist --target "$TARGET" --zig
  artifacts:
    paths:
      - dist/
    expire_in: 1 week

windows-cross-wheels:
  stage: wheels
  image: rust:bookworm
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v/'
  parallel:
    matrix:
      - TARGET:
          - x86_64-pc-windows-msvc
  before_script:
    - apt-get update
    - apt-get install -y clang lld llvm python3-pip curl ca-certificates
    - ln -sf "$(command -v clang)" /usr/local/bin/clang-cl
    - curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal
    - export PATH="/usr/local/cargo/bin:$PATH"
    - python3 -m pip install --break-system-packages maturin
  script:
    - export PATH="/usr/local/cargo/bin:$PATH"
    - rustup target add "$TARGET"
    - maturin build --release --compatibility pypi --out dist --target "$TARGET"
  artifacts:
    paths:
      - dist/
    expire_in: 1 week

macos-cross-wheels:
  stage: wheels
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v/'
  parallel:
    matrix:
      - TARGET: x86_64-apple-darwin
        MACOS_IMAGE: registry.gitlab.rylanswebsite.com/rylan-meilutis/macos-cargo-image/x86_64-apple-darwin:x86_64-apple-darwin
      - TARGET: aarch64-apple-darwin
        MACOS_IMAGE: registry.gitlab.rylanswebsite.com/rylan-meilutis/macos-cargo-image/aarch64-apple-darwin:aarch64-apple-darwin
  image:
    name: $MACOS_IMAGE
    entrypoint: [""]
  script:
    - python3 -m pip install maturin || pip3 install maturin
    - maturin build --release --compatibility pypi --out dist --target "$TARGET"
  artifacts:
    paths:
      - dist/
    expire_in: 1 week

python-sdist:
  stage: wheels
  image:
    name: ghcr.io/pyo3/maturin:latest
    entrypoint: [""]
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v/'
  script:
    - maturin sdist --out dist
  artifacts:
    paths:
      - dist/
    expire_in: 1 week

pypi-release:
  stage: publish
  image: python:3.12
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v/'
  needs:
    - job: linux-wheels
      artifacts: true
    - job: python-sdist
      artifacts: true
    - job: windows-cross-wheels
      artifacts: true
      optional: true
    - job: macos-cross-wheels
      artifacts: true
      optional: true
  script:
    - python3 -m pip install maturin
    - maturin upload --username __token__ --password "$MATURIN_PYPI_TOKEN" dist/*

sast:
  stage: test
include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml
